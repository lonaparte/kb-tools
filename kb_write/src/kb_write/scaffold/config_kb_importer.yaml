# kb-importer configuration
#
# Zotero API credentials live here by reference (env var names).
# The actual ZOTERO_API_KEY is set in your shell rc (~/.bashrc).

zotero:
  # Your Zotero user ID (numeric, not username). Find yours at
  # https://www.zotero.org/settings/keys — shown as "Your userID
  # for use in API calls".
  # library_id: ""              # e.g. "1234567" (string, not int)

  # Library type: "user" (personal) or "group" (shared).
  library_type: user

  # Source mode (default flipped live → web in 0.28.0):
  #   "web"  — Zotero cloud API (api.zotero.org). Requires
  #            library_id (above) + ZOTERO_API_KEY in env. Works
  #            headlessly; no Zotero app needed. THIS IS THE
  #            RECOMMENDED DEFAULT.
  #   "live" — Zotero's local HTTP API at localhost:23119.
  #            Requires Zotero desktop app running. No key needed.
  source_mode: web

  # Env var that holds your Zotero API key (only used in web mode).
  api_key_env: ZOTERO_API_KEY

# Fulltext summarization config is primarily driven by CLI flags
# (`--fulltext-provider`, `--fulltext-model`, `--fulltext-max-tokens`).
# This section is intentionally minimal — most runs are one-off CLI
# invocations, not long-lived server state.
#
# Supported providers (see `kb-importer import papers --help`):
#   gemini     (default) — GEMINI_API_KEY. Free tier covers
#                          ~1000 papers/day at 3.1-pro-preview.
#   openai                — OPENAI_API_KEY. gpt-4o-mini by default.
#   deepseek              — DEEPSEEK_API_KEY. deepseek-chat.
#   openrouter            — OPENROUTER_API_KEY. Routes to any
#                           OpenRouter-catalog model; default
#                           openai/gpt-4o-mini. Use this to try
#                           claude-sonnet-4.5 / gemini-2.5-flash /
#                           other vendors without per-provider
#                           accounts.
#
# kb-mcp's RAG embedding pipeline is a completely separate
# configuration — see `.ee-kb-tools/config/kb-mcp.yaml`. The two
# never share state; changing one does not affect the other.

logging:
  level: info
